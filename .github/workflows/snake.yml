name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Gabrieltg77
          outputs: |
            dist/snake.svg?color_snake=#ef4444&color_dots=#2d2d2d,#0e4429,#006d32,#26a641,#39d353
            dist/snake-dark.svg?palette=github-dark&color_snake=#ef4444&color_dots=#2d2d2d,#0e4429,#006d32,#26a641,#39d353
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
